<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Lab Inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <style>
        /* Dashboard Specific Overrides */
        :root {
            --sidebar-width: 280px;
        }

        body {
            background: var(--bg-gradient);
            overflow: hidden; /* Control scroll within content area */
            display: flex;
            height: 100vh;
        }

        .dashboard-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            z-index: 100;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 3rem;
            padding: 0 10px;
        }

        .sidebar-logo {
            width: 32px;
            height: 32px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            display: grid;
            place-items: center;
            font-weight: bold;
            color: var(--text-main);
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 4px;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--border);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 3rem;
            position: relative;
        }

        .main-content::-webkit-scrollbar { width: 8px; }
        .main-content::-webkit-scrollbar-track { background: transparent; }
        .main-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .content-header h1 {
            font-size: 32px;
            font-weight: 500;
            letter-spacing: -0.5px;
        }

        .view-section {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Inventory Grid */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .inventory-card {
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .inventory-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255,255,255,0.4);
        }

        .card-image {
            height: 180px;
            background: rgba(0, 0, 0, 0.3);
            display: grid;
            place-items: center;
            position: relative;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 1.5rem;
        }
        
        .card-content h3 {
            font-weight: 500;
            font-size: 1.1rem;
        }

        .card-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .stock-indicator {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        .stock-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .stock-progress {
            height: 100%;
            background: rgba(255,255,255,0.8);
            width: 70%;
        }

        /* Requests Table */
        .requests-container {
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .request-row {
            display: grid;
            grid-template-columns: 2fr 2fr 1fr 2fr 1.5fr;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }
        
        .request-row:last-child {
            border-bottom: none;
        }

        .request-header {
            background: rgba(0, 0, 0, 0.2);
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-accept:hover { background: rgba(255,255,255,0.1); color: var(--text-main); border-color: rgba(255,255,255,0.4); }
        .btn-reject:hover { background: rgba(255, 50, 50, 0.1); color: #ffbba1; border-color: rgba(255,50,50,0.3); }

        /* Modal */
        .card-delete-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 32px;
            height: 32px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 50, 50, 0.3);
            border-radius: 4px;
            color: #ffbba1;
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0;
            backdrop-filter: blur(4px);
        }

        .inventory-card:hover .card-delete-btn {
            opacity: 1;
        }

        .card-delete-btn:hover {
            background: rgba(255,50,50,0.2);
            color: white;
            border-color: rgba(255,50,50,0.8);
        }

        .card-delete-btn svg {
            width: 16px;
            height: 16px;
        }

        /* Sub-view Toggles */
        .toggle-group {
            display: flex;
            background: transparent;
            padding: 4px;
            border-radius: 4px;
            border: 1px solid var(--border);
            gap: 4px;
        }

        .toggle-btn {
            padding: 8px 16px;
            border-radius: 4px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .toggle-btn.active {
            background: rgba(255,255,255,0.1);
            color: var(--text-main);
            border: 1px solid var(--border);
        }
        
        .toggle-btn:hover:not(.active) {
            background: rgba(255,255,255,0.05);
        }

        .sub-view {
            display: none;
            animation: slideIn 0.4s ease-out;
        }

        .sub-view.active {
            display: block;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Utility */
        .accent-text { color: var(--text-main); font-weight: bold; }
        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .text-secondary {
            color: var(--text-muted);
        }
        .glass-card {
            background: rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-logo">L</div>
                <h2 style="font-size: 1.25rem; font-weight: 700; letter-spacing: -0.5px;">LAB DASH</h2>
            </div>

            <nav class="sidebar-nav">
                <a class="nav-item active" data-view="catalogue">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="10"></rect><rect x="3" y="14" width="7" height="10"></rect></svg>
                    <span>Lab Catalogue</span>
                </a>
                <a class="nav-item" data-view="requests">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    <span>My Status</span>
                </a>
                
                
            </nav>

            <div class="sidebar-footer">
                <button id="logout-btn" class="nav-item" style="width: 100%; text-align: left; background: none; border: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    <span>Sign Out</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-info">
                    <h1 id="view-title">Lab Catalogue</h1>
                    <p id="view-subtitle" class="text-secondary">Manage and track laboratory equipment in real-time.</p>
                </div>
                <div class="header-actions">
                    
                </div>
            </header>

            <!-- Catalogue View -->
            <section id="view-catalogue" class="view-section active">
                <!-- Sub-view: List -->
                
                    <div id="inventory-list" class="inventory-grid">
                        <div class="empty-state">Loading your lab catalogue...</div>
                    </div>
                </div>

                <!-- Sub-view: Add Item -->
                </section>

            <!-- Requests View -->
            <section id="view-requests" class="view-section">
                <div class="requests-container">
                    <div class="request-row request-header" style="grid-template-columns: 2fr 1fr 2fr 1fr;">
                        <div>Component</div>
                        <div>Qty</div>
                        <div>Purpose</div>
                        <div>Status</div>
                    </div>
                        <div>Component</div>
                        <div>Qty</div>
                        <div>Purpose</div>
                        <div>Actions</div>
                    </div>
                    <div id="requests-list">
                        <!-- Rows injected here -->
                        <div class="empty-state">No pending requests.</div>
                    </div>
                </div>
            </section>

            <!-- Alerts View -->
            

            <!-- Tracking View -->
            
        </main>
    </div>


    <!-- Scripts -->
    <script type="module" src="student-dashboard.js"></script>

    <!-- Request Modal -->
    <div class="modal" id="request-modal">
        <div class="modal-content glass-card" style="width: 400px;">
            <button class="modal-close-btn" id="close-modal" style="position:absolute;top:20px;right:20px;background:none;border:none;color:white;cursor:pointer;font-size:18px;">✕</button>
            <h2 class="accent-text" style="margin-bottom: 24px;">Borrow Request</h2>
            <form id="borrow-form">
                <input type="hidden" id="borrow-comp-id">
                <div class="input-group">
                    <label>Quantity</label>
                    <input type="number" id="borrow-qty" required min="1" placeholder="1">
                </div>
                <div class="input-group">
                    <label>Purpose</label>
                    <input type="text" id="borrow-purpose" required placeholder="Reason for borrowing">
                </div>
                <div style="margin-top: 2rem;">
                    <button type="submit" class="submit-btn glitch-target" id="submit-borrow-btn">
                        <span class="btn-text">Submit Request</span>
                        <div class="spinner"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
